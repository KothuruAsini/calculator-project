<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basic Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="calculator-shell">
    <section class="calculator" aria-label="Basic Calculator">
      <header class="calculator-header">
        <p class="eyebrow">Simple, fast, reliable</p>
        <h1>Calculator</h1>
      </header>

      <div class="display" role="status" aria-live="polite">
        <div class="history" id="history" aria-label="Previous calculation"></div>
        <div class="current" id="display" aria-label="Current input">0</div>
      </div>

      <div class="buttons" aria-label="Calculator buttons">
        <button class="btn utility" data-action="clear">C</button>
        <button class="btn utility" data-action="delete">DEL</button>
        <button class="btn operator" data-value="/">/</button>
        <button class="btn operator" data-value="*">*</button>

        <button class="btn number" data-value="7">7</button>
        <button class="btn number" data-value="8">8</button>
        <button class="btn number" data-value="9">9</button>
        <button class="btn operator" data-value="-">-</button>

        <button class="btn number" data-value="4">4</button>
        <button class="btn number" data-value="5">5</button>
        <button class="btn number" data-value="6">6</button>
        <button class="btn operator" data-value="+">+</button>

        <button class="btn number" data-value="1">1</button>
        <button class="btn number" data-value="2">2</button>
        <button class="btn number" data-value="3">3</button>
        <button class="btn equal" data-action="equals">=</button>

        <button class="btn number zero" data-value="0">0</button>
        <button class="btn number" data-value=".">.</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
